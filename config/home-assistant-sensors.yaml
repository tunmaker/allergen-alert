# Home Assistant MQTT Sensor Configuration for Allergen Alert
# Add these to your Home Assistant configuration.yaml or create a separate file
# and include it with: !include config/home-assistant-sensors.yaml

# Note: Home Assistant can also auto-discover sensors via MQTT discovery
# if you have MQTT integration enabled with discovery: true

# Enable MQTT integration (add to configuration.yaml if not already present)
mqtt:
  broker: !secret mqtt_broker
  port: 8883
  username: !secret mqtt_user
  password: !secret mqtt_password
  tls_version: tlsv1_2
  discovery: true
  discovery_prefix: homeassistant

